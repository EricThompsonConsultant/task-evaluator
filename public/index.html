<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Statement Evaluator | FOCUS Learning</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #09090b; color: #f4f4f5; font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
    button { cursor: pointer; font-family: inherit; }
    textarea { font-family: inherit; resize: vertical; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    var useState = React.useState;
    var useRef = React.useRef;
    var useEffect = React.useEffect;

    var SC = {
      GREEN:  { c: "#22c55e", d: "#16a34a33", b: "#22c55e55", label: "Passes" },
      YELLOW: { c: "#eab308", d: "#ca930433", b: "#eab30855", label: "Minor Issue" },
      ORANGE: { c: "#f97316", d: "#ea580c33", b: "#f9731655", label: "Needs Revision" },
      RED:    { c: "#ef4444", d: "#dc262633", b: "#ef444455", label: "Unsatisfactory" }
    };

    var FL = {
      F1:"Overly Broad / Likely a Duty", F2:"Overly Specific / Likely a Step",
      F3:"Likely a Skill, Not a Task",   F4:"Not Observable",
      F5:"Not Measurable",               F6:"Not Outcome-Based",
      F7:"Ambiguous / Unclear Scope",    F8:"Style / Consistency",
      F9:"Compound Statement",           F10:"Insufficient Precision"
    };

    var ORDER = ["GREEN","YELLOW","ORANGE","RED"];

    function App() {
      var s1 = useState(""),    input = s1[0],    setInput = s1[1];
      var s2 = useState([]),    results = s2[0],  setResults = s2[1];
      var s3 = useState(false), loading = s3[0],  setLoading = s3[1];
      var s4 = useState(""),    error = s4[0],    setError = s4[1];
      var s5 = useState(null),  expanded = s5[0], setExpanded = s5[1];
      var s6 = useState("ALL"), filter = s6[0],   setFilter = s6[1];
      var fileRef = useRef();
      var chartRef = useRef(null);
      var chartInst = useRef(null);

      function handleFile(e) {
        var f = e.target.files[0];
        if (!f) return;
        var r = new FileReader();
        r.onload = function(ev) { setInput(ev.target.result); };
        r.readAsText(f);
        e.target.value = "";
      }

      async function evaluate() {
        var lines = input.split("\n").map(function(l){ return l.trim(); }).filter(Boolean);
        if (!lines.length) { setError("Enter at least one task statement."); return; }
        if (lines.length > 20) { setError("Please submit 20 or fewer tasks at a time."); return; }
        setError(""); setLoading(true); setResults([]); setExpanded(null); setFilter("ALL");
        try {
          var numbered = lines.map(function(l,i){ return (i+1) + ". " + l; }).join("\n");
          var res = await fetch("/api/evaluate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tasks: numbered })
          });
          var data = await res.json();
          var text = (data.content || []).map(function(b){ return b.text || ""; }).join("");
          var bt = String.fromCharCode(96);
          var clean = text.split(bt+bt+bt+"json").join("").split(bt+bt+bt).join("").trim();
          setResults(JSON.parse(clean));
        } catch(e) {
          setError("Evaluation failed. Please try again.");
        }
        setLoading(false);
      }

      var counts = {};
      ORDER.forEach(function(s){ counts[s] = results.filter(function(r){ return r.score === s; }).length; });

      var chartData = ORDER.filter(function(s){ return counts[s] > 0; }).map(function(s){
        return { name: s, count: counts[s], color: SC[s].c };
      });

      var filtered = filter === "ALL" ? results : results.filter(function(r){ return r.score === filter; });
      var passRate = results.length ? Math.round((counts.GREEN / results.length) * 100) : 0;

      useEffect(function() {
        if (!chartRef.current || chartData.length < 2) return;
        if (chartInst.current) chartInst.current.destroy();
        chartInst.current = new Chart(chartRef.current, {
          type: "bar",
          data: {
            labels: chartData.map(function(d){ return d.name; }),
            datasets: [{
              data: chartData.map(function(d){ return d.count; }),
              backgroundColor: chartData.map(function(d){ return d.color; }),
              borderRadius: 4, borderSkipped: false
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { grid: { display: false }, ticks: { color: "#71717a", font: { size: 11 } }, border: { display: false } },
              y: { grid: { color: "#1f1f23" }, ticks: { color: "#71717a", font: { size: 11 }, stepSize: 1 }, border: { display: false } }
            }
          }
        });
        return function(){ if (chartInst.current) chartInst.current.destroy(); };
      }, [JSON.stringify(chartData)]);

      return (
        <div style={{minHeight:"100vh",background:"#09090b",color:"#f4f4f5"}}>

          <div style={{background:"#111113",borderBottom:"1px solid #1f1f23",padding:"28px 36px 22px"}}>
            <div style={{maxWidth:860,margin:"0 auto"}}>
              <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:6}}>
                <div style={{display:"flex",flexDirection:"column",gap:3}}>
                  {["#22c55e","#eab308","#f97316","#ef4444"].map(function(c){
                    return <div key={c} style={{width:28,height:5,background:c,borderRadius:3}} />;
                  })}
                </div>
                <div>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.18em",color:"#52525b",textTransform:"uppercase"}}>FOCUS Learning</div>
                  <h1 style={{margin:0,fontSize:24,fontWeight:800,color:"#fafafa",letterSpacing:"-0.02em",lineHeight:1.2}}>Task Statement Evaluator</h1>
                </div>
              </div>
              <p style={{margin:"10px 0 0 42px",color:"#71717a",fontSize:13,lineHeight:1.5}}>
                Evaluate task statements against the FOCUS Learning quality standard. Each statement is scored Green, Yellow, Orange, or Red.
              </p>
            </div>
          </div>

          <div style={{maxWidth:860,margin:"0 auto",padding:"28px 36px"}}>

            <div style={{background:"#111113",border:"1px solid #27272a",borderRadius:12,padding:22,marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:11,fontWeight:700,letterSpacing:"0.12em",color:"#71717a",textTransform:"uppercase"}}>Task Statements — one per line</span>
                <button onClick={function(){ fileRef.current.click(); }}
                  style={{fontSize:12,color:"#a1a1aa",background:"#1f1f23",border:"1px solid #3f3f46",borderRadius:6,padding:"5px 12px"}}>
                  Upload .txt / .csv
                </button>
                <input ref={fileRef} type="file" accept=".txt,.csv" style={{display:"none"}} onChange={handleFile} />
              </div>
              <textarea value={input} onChange={function(e){ setInput(e.target.value); }}
                placeholder="Enter one task statement per line..."
                style={{width:"100%",minHeight:150,background:"#09090b",border:"1px solid #3f3f46",borderRadius:8,color:"#e4e4e7",fontSize:13.5,padding:"12px 14px",outline:"none",lineHeight:1.65,boxSizing:"border-box"}} />
              {error && <div style={{color:"#ef4444",fontSize:12.5,marginTop:8}}>{error}</div>}
              <div style={{display:"flex",gap:10,alignItems:"center",marginTop:14}}>
                <button onClick={evaluate} disabled={loading}
                  style={{background:loading?"#1f1f23":"linear-gradient(135deg,#16a34a,#15803d)",color:loading?"#52525b":"#fff",border:"none",borderRadius:8,padding:"10px 26px",fontSize:14,fontWeight:700,cursor:loading?"not-allowed":"pointer"}}>
                  {loading ? "Evaluating..." : "Evaluate Tasks →"}
                </button>
                {(input || results.length > 0) && (
                  <button onClick={function(){ setInput(""); setResults([]); setError(""); setExpanded(null); setFilter("ALL"); }}
                    style={{fontSize:12.5,color:"#52525b",background:"none",border:"none"}}>Clear all</button>
                )}
              </div>
            </div>

            {loading && <div style={{textAlign:"center",padding:"52px 0",color:"#52525b",fontSize:13}}>Analyzing task statements...</div>}

            {results.length > 0 && !loading && (
              <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",gap:10,marginBottom:20}}>
                  <div style={{background:"#111113",border:"1px solid #27272a",borderRadius:10,padding:"14px 16px"}}>
                    <div style={{fontSize:26,fontWeight:800,color:"#fafafa"}}>{results.length}</div>
                    <div style={{fontSize:10,color:"#52525b",textTransform:"uppercase",letterSpacing:"0.1em",marginTop:3}}>Total</div>
                  </div>
                  {ORDER.map(function(s){
                    var cfg = SC[s];
                    return (
                      <button key={s} onClick={function(){ setFilter(filter === s ? "ALL" : s); }}
                        style={{background:filter===s?cfg.d:"#111113",border:"1px solid "+(filter===s?cfg.c:cfg.b),borderRadius:10,padding:"14px 16px",textAlign:"left"}}>
                        <div style={{fontSize:26,fontWeight:800,color:cfg.c}}>{counts[s]}</div>
                        <div style={{fontSize:10,color:"#71717a",textTransform:"uppercase",letterSpacing:"0.1em",marginTop:3}}>{cfg.label}</div>
                      </button>
                    );
                  })}
                </div>

                {chartData.length > 1 && (
                  <div style={{background:"#111113",border:"1px solid #27272a",borderRadius:12,padding:"18px 22px",marginBottom:20}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#52525b",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:14}}>Score Distribution</div>
                    <div style={{height:120,position:"relative"}}><canvas ref={chartRef} /></div>
                  </div>
                )}

                {filter !== "ALL" && (
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                    <span style={{fontSize:12,color:"#71717a"}}>Showing:</span>
                    <span style={{fontSize:12,fontWeight:700,color:SC[filter].c,background:SC[filter].d,border:"1px solid "+SC[filter].b,borderRadius:6,padding:"2px 10px"}}>{filter}</span>
                    <button onClick={function(){ setFilter("ALL"); }} style={{fontSize:11,color:"#52525b",background:"none",border:"none"}}>× Show all</button>
                  </div>
                )}

                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {filtered.map(function(r,i){
                    var cfg = SC[r.score] || SC.RED;
                    var isOpen = expanded === r.id + i;
                    return (
                      <div key={i} style={{background:"#111113",border:"1px solid "+(isOpen?cfg.c+"88":cfg.b),borderRadius:10,overflow:"hidden"}}>
                        <div onClick={function(){ setExpanded(isOpen ? null : r.id + i); }}
                          style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",cursor:"pointer"}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,minWidth:100}}>
                            <div style={{width:10,height:10,borderRadius:"50%",background:cfg.c,flexShrink:0}} />
                            <span style={{fontSize:11,fontWeight:800,color:cfg.c}}>{r.score}</span>
                          </div>
                          <span style={{fontSize:11,color:"#3f3f46",fontWeight:600,minWidth:30}}>#{r.id}</span>
                          <span style={{flex:1,fontSize:13.5,color:"#d4d4d8",fontWeight:500}}>{r.task}</span>
                          <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end",maxWidth:180}}>
                            {(r.faults || []).map(function(f){
                              return <span key={f} style={{fontSize:10,fontWeight:700,background:cfg.d,color:cfg.c,border:"1px solid "+cfg.b,borderRadius:4,padding:"2px 6px"}}>{f}</span>;
                            })}
                          </div>
                          <span style={{color:"#3f3f46",fontSize:12}}>{isOpen ? "▲" : "▼"}</span>
                        </div>
                        {isOpen && (
                          <div style={{borderTop:"1px solid "+cfg.c+"22",padding:"14px 16px",background:cfg.d+"66"}}>
                            {(r.faults || []).length > 0 && (
                              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                                {r.faults.map(function(f){
                                  return (
                                    <span key={f} style={{fontSize:11.5,background:"#18181b",color:cfg.c,border:"1px solid "+cfg.b,borderRadius:6,padding:"3px 10px",fontWeight:600}}>
                                      {f} — {FL[f]}
                                    </span>
                                  );
                                })}
                              </div>
                            )}
                            <p style={{margin:0,fontSize:13.5,color:"#a1a1aa",lineHeight:1.65}}>{r.explanation}</p>
                            {(r.suggestions || []).length > 0 && (
                              <div style={{marginTop:14}}>
                                <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",color:"#71717a",textTransform:"uppercase",marginBottom:8}}>
                                  Suggested Rewording{r.suggestions.length > 1 ? "s" : ""}
                                </div>
                                {r.suggestions.map(function(sug,si){
                                  return (
                                    <div key={si} style={{background:"#18181b",border:"1px solid #3f3f46",borderRadius:6,padding:"10px 14px",marginBottom:si < r.suggestions.length - 1 ? 6 : 0,fontSize:13.5,color:"#e4e4e7",lineHeight:1.6}}>
                                      {r.suggestions.length > 1 && <span style={{fontSize:11,fontWeight:700,color:"#52525b",marginRight:8}}>{si+1}.</span>}
                                      {sug}
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                <div style={{marginTop:20,padding:"14px 18px",background:"#111113",border:"1px solid #1f1f23",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#52525b"}}>Pass rate (Green)</span>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:140,height:6,background:"#27272a",borderRadius:3,overflow:"hidden"}}>
                      <div style={{width:passRate+"%",height:"100%",background:"#22c55e",borderRadius:3}} />
                    </div>
                    <span style={{fontSize:13,fontWeight:700,color:"#22c55e"}}>{passRate}%</span>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
